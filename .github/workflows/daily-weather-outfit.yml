name: Daily Weather Outfit Agent

on:
  schedule:
    # Runs every day at 7:00 AM Australia/Sydney during standard time.
    # GitHub schedules are UTC, so adjust this if your local time changes.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      color_preference:
        description: "Preferred colors, for example black, navy, grey"
        required: false
        default: ""
      style_preference:
        description: "Preferred style, for example minimalist smart casual"
        required: false
        default: ""
      brand_preference:
        description: "Brand notes, for example Uniqlo only or open to similar basics"
        required: false
        default: ""
      avoid_preference:
        description: "Items to avoid, separated by commas, for example puffer, shorts"
        required: false
        default: ""

jobs:
  weather-outfit:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run weather outfit agent
        env:
          LATITUDE: ${{ vars.LATITUDE || '-33.8688' }}
          LONGITUDE: ${{ vars.LONGITUDE || '151.2093' }}
          LOCATION_NAME: ${{ vars.LOCATION_NAME || 'Sydney, NSW' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Australia/Sydney' }}
          COLOR_PREFERENCE: ${{ github.event.inputs.color_preference || vars.COLOR_PREFERENCE || 'neutral colors' }}
          STYLE_PREFERENCE: ${{ github.event.inputs.style_preference || vars.STYLE_PREFERENCE || 'minimal, comfortable, smart casual' }}
          BRAND_PREFERENCE: ${{ github.event.inputs.brand_preference || vars.BRAND_PREFERENCE || 'Uniqlo' }}
          AVOID_PREFERENCE: ${{ github.event.inputs.avoid_preference || vars.AVOID_PREFERENCE || 'none' }}
        run: node src/weather-outfit-agent.js
